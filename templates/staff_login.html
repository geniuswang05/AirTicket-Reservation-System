<!DOCTYPE html>
<html>
<head>
    <title>Airline Staff Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="left-panel">
            <div class="brand">
                <img src="{{ url_for('static', filename='images/airplane-logo.png') }}" alt="Logo">
                <h2>Wheelan Skylink</h2>
                <p class="tagline">Staff Portal - Excellence in aviation</p>
            </div>
        </div>
        <div class="right-panel">
            <div class="login-form">
                <h1>Airline Staff Login</h1>
                <h2>Access Staff Dashboard</h2>
                
                {% if error %}
                    <div class="error-message">{{ error }}</div>
                {% endif %}
                
                <form action="/staff/loginAuth" method="POST">
                    <div class="form-group">
                        <label for="username">Username:</label>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="login-btn">Login</button>
                </form>
                
                <div class="register-link">
                    <p>Don't have an account? <a href="/staff/register">Register here</a></p>
                    <p><a href="/">Go back to home</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
