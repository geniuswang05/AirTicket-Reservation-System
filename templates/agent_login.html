<!DOCTYPE html>
<html>
<head>
    <title>Booking Agent Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="left-panel">
            <div class="brand">
                <img src="{{ url_for('static', filename='images/airplane-logo.png') }}" alt="Logo">
                <h2>Wheelan Skylink</h2>
                <p class="tagline">Partner with us in travel excellence</p>
            </div>
        </div>
        <div class="right-panel">
            <div class="login-form">
                <h1>Booking Agent Login</h1>
                <h2>Access Your Dashboard</h2>
                
                {% if error %}
                    <div class="error-message">{{ error }}</div>
                {% endif %}
                
                <form action="/agent/loginAuth" method="POST">
                    <div class="form-group">
                        <label for="email">Email Address:</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="login-btn">Login</button>
                </form>
                
                <div class="register-link">
                    <p>Don't have an account? <a href="/agent/register">Register here</a></p>
                    <p><a href="/">Go back to home</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
