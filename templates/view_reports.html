<!DOCTYPE html>
<html>
<head>
    <title>Sales Reports - Wheelan Skylink</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .form-group { margin-bottom: 20px; }
        .form-group label { display: inline-block; margin-right: 10px; font-weight: 500; }
        .form-group input, .form-group select { padding: 8px 10px; border-radius: 4px; border: 1px solid #ddd; }
        .form-submit { background-color: #4285f4; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: 500; }
        .form-submit:hover { background-color: #3367d6; }
        .summary-box { 
            display: flex; 
            gap: 20px; 
            margin-top: 20px;
        }
        .summary-item {
            flex: 1;
            padding: 20px;
            background-color: #f5f7fa;
            border-radius: 8px;
            text-align: center;
        }
        .summary-value {
            font-size: 24px;
            font-weight: 700;
            color: #4285f4;
            margin-top: 8px;
        }
        .chart-container {
            height: 350px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <img src="{{ url_for('static', filename='images/airplane-logo.png') }}" alt="Logo">
                <h2>Wheelan Skylink</h2>
            </div>
            
            <div class="nav-links">
                <a href="{{ url_for('staff_home') }}">
                    <span class="icon">🏠</span>
                    <span>Home</span>
                </a>
                <a href="{{ url_for('view_reports') }}" class="active">
                    <span class="icon">📊</span>
                    <span>Sales Reports</span>
                </a>
                <a href="{{ url_for('revenue_comparison') }}">
                    <span class="icon">💰</span>
                    <span>Revenue</span>
                </a>
                <a href="{{ url_for('top_destinations') }}">
                    <span class="icon">🌍</span>
                    <span>Destinations</span>
                </a>
                <a href="{{ url_for('logout') }}">
                    <span class="icon">🚪</span>
                    <span>Logout</span>
                </a>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1>Sales Reports</h1>
                </div>
                <div class="user-info">
                    <div class="user-name">
                        <span>Staff Account</span>
                    </div>
                    <div class="user-avatar">
                        <span>S</span>
                    </div>
                </div>
            </div>
            
            <div class="dashboard-content">
                <!-- Date Range Filter -->
                <div class="card">
                    <h3>Select Date Range</h3>
                    <form method="POST">
                        <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                            <div class="form-group">
                                <label>Start Date:</label>
                                <input type="date" name="start_date" value="{{ start_date }}">
                            </div>
                            <div class="form-group">
                                <label>End Date:</label>
                                <input type="date" name="end_date" value="{{ end_date }}">
                            </div>
                            <div class="form-group">
                                <button type="submit" class="form-submit">Generate Report</button>
                            </div>
                        </div>
                    </form>
                    
                    <div class="summary-box">
                        <div class="summary-item">
                            <h4>Total Tickets Sold</h4>
                            <div class="summary-value">{{ summary.total_tickets }}</div>
                        </div>
                        <div class="summary-item">
                            <h4>Total Revenue</h4>
                            <div class="summary-value">${{ "%.2f"|format(summary.total_revenue) }}</div>
                        </div>
                    </div>
                </div>
                
                <!-- Monthly Ticket Sales Chart -->
                <div class="card">
                    <h3>Monthly Ticket Sales (Past Year)</h3>
                    <div class="chart-container">
                        <canvas id="salesChart"></canvas>
                    </div>
                    <script>
                        const ctx = document.getElementById('salesChart').getContext('2d');
                        const chart = new Chart(ctx, {
                            type: 'bar',
                            data: {
                                labels: {{ month_stats | map(attribute='month') | list | tojson }},
                                datasets: [{
                                    label: 'Tickets Sold',
                                    data: {{ month_stats | map(attribute='ticket_count') | list | tojson }},
                                    backgroundColor: 'rgba(66, 133, 244, 0.7)',
                                    borderColor: 'rgba(66, 133, 244, 1)',
                                    borderWidth: 1
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                scales: {
                                    y: { 
                                        beginAtZero: true,
                                        title: {
                                            display: true,
                                            text: 'Number of Tickets'
                                        }
                                    },
                                    x: {
                                        title: {
                                            display: true,
                                            text: 'Month'
                                        }
                                    }
                                }
                            }
                        });
                    </script>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
