<!DOCTYPE html>
<html>
<head>
    <title>Customer Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .form-grid .form-group {
            margin-bottom: 15px;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        .login-form {
            max-width: 600px;
        }
        
        .right-panel {
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="left-panel">
            <div class="brand">
                <img src="{{ url_for('static', filename='images/airplane-logo.png') }}" alt="Logo">
                <h2>Wheelan Skylink</h2>
                <p class="tagline">Start your journey with us</p>
            </div>
        </div>
        <div class="right-panel">
            <div class="login-form">
                <h1>Customer Registration</h1>
                <h2>Create Your Account</h2>
                
                {% if error %}
                    <div class="error-message">{{ error }}</div>
                {% endif %}
                
                <form action="/customer/register" method="POST">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="email">Email Address:</label>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required>
                        </div>
                        
                        <div class="form-group full-width">
                            <label for="name">Full Name:</label>
                            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                        </div>
                        
                        <div class="form-group full-width">
                            <label for="password">Password:</label>
                            <input type="password" id="password" name="password" placeholder="Create a password" required>
                            <div id="password-strength" style="margin-top: 5px; font-size: 12px;"></div>
                        </div>
                        
                        <div class="form-group">
                            <label for="building_number">Building Number:</label>
                            <input type="text" id="building_number" name="building_number" placeholder="Building #">
                        </div>
                        
                        <div class="form-group">
                            <label for="street">Street:</label>
                            <input type="text" id="street" name="street" placeholder="Street name">
                        </div>
                        
                        <div class="form-group">
                            <label for="city">City:</label>
                            <input type="text" id="city" name="city" placeholder="City">
                        </div>
                        
                        <div class="form-group">
                            <label for="state">State:</label>
                            <input type="text" id="state" name="state" placeholder="State">
                        </div>
                        
                        <div class="form-group">
                            <label for="phone_number">Phone Number:</label>
                            <input type="text" id="phone_number" name="phone_number" placeholder="Phone number">
                        </div>
                        
                        <div class="form-group">
                            <label for="passport_number">Passport Number:</label>
                            <input type="text" id="passport_number" name="passport_number" placeholder="Passport #">
                        </div>
                        
                        <div class="form-group">
                            <label for="passport_expiration">Passport Expiration:</label>
                            <input type="date" id="passport_expiration" name="passport_expiration">
                        </div>
                        
                        <div class="form-group">
                            <label for="passport_country">Passport Country:</label>
                            <input type="text" id="passport_country" name="passport_country" placeholder="Country">
                        </div>
                        
                        <div class="form-group full-width">
                            <label for="date_of_birth">Date of Birth:</label>
                            <input type="date" id="date_of_birth" name="date_of_birth">
                        </div>
                    </div>
                    
                    <button type="submit" class="login-btn">Register</button>
                </form>
                
                <div class="register-link">
                    <p>Already have an account? <a href="/customer/login">Login here</a></p>
                    <p><a href="/">Go back to home</a></p>
                </div>
            </div>
        </div>
    </div>

<script>
function validatePassword() {
  const password = document.getElementById("password").value;
  const strength = document.getElementById("password-strength");
  
  // Check password length
  if (password.length < 8) {
    strength.innerHTML = "Password is too short (min 8 characters)";
    strength.style.color = "red";
    return false;
  }
  
  // Check for numbers and letters
  if (!/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/[0-9]/.test(password)) {
    strength.innerHTML = "Password should contain uppercase, lowercase, and numbers";
    strength.style.color = "orange";
    return false;
  }
  
  strength.innerHTML = "Password strength: Strong";
  strength.style.color = "green";
  return true;
}

// Add an onSubmit handler to the form
document.querySelector("form").onsubmit = function(e) {
  if (!validatePassword()) {
    e.preventDefault();
  }
};

// Add real-time validation as user types
document.getElementById("password").addEventListener("input", validatePassword);
</script>
</body>
</html>
