<!DOCTYPE html>
<html>
<head>
    <title>Customer Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="left-panel">
            <div class="brand">
                <img src="{{ url_for('static', filename='images/airplane-logo.png') }}" alt="Logo">
                <h2>Wheelan Skylink</h2>
                <p class="tagline">We aim to make your travel experience better</p>
            </div>
        </div>
        <div class="right-panel">
            <div class="login-form">
                <h1>Customer Login</h1>
                <h2>Welcome Back</h2>
                
                {% if error %}
                    <div class="error-message">{{ error }}</div>
                {% endif %}
                
                <form action="/customer/loginAuth" method="POST">
                    <div class="form-group">
                        <label for="email_address">Email Address:</label>
                        <input type="email" id="email_address" name="email address" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    
                    <button type="submit" class="login-btn">Login</button>
                </form>
                
                <div class="register-link">
                    <p>Don't have an account? <a href="/customer/register">Register here</a></p>
                    <p><a href="/">Go back to home</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
