<!DOCTYPE html>
<html>
<head>
    <title>Airline Staff Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .form-grid .form-group {
            margin-bottom: 15px;
        }
        
        .full-width {
            grid-column: 1 / -1;
        }
        
        /* Fix for dropdown text visibility */
        select option {
            color: #333; /* Dark text color */
            background-color: white; /* Light background */
        }
        
        /* Ensure the selected item is also visible */
        select, select option:selected {
            color: #333; /* Dark text color */
        }
    </style>
</head>
<!-- Rest of the HTML remains the same -->
<body>
    <div class="login-container">
        <div class="left-panel">
            <div class="brand">
                <img src="{{ url_for('static', filename='images/airplane-logo.png') }}" alt="Logo">
                <h2>Wheelan Skylink</h2>
                <p class="tagline">Join our team of aviation professionals</p>
            </div>
        </div>
        <div class="right-panel">
            <div class="login-form">
                <h1>Airline Staff Registration</h1>
                <h2>Create Your Account</h2>
                
                {% if error %}
                    <div class="error-message">{{ error }}</div>
                {% endif %}
                
                <form action="/staff/register" method="POST">
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label for="username">Username:</label>
                            <input type="text" id="username" name="username" placeholder="Create a username" required>
                        </div>
                        
                        <div class="form-group full-width">
                            <label for="password">Password:</label>
                            <input type="password" id="password" name="password" placeholder="Create a password" required>
                            <div id="password-strength" style="margin-top: 5px; font-size: 12px;"></div>
                        </div>
                        
                        <div class="form-group">
                            <label for="first_name">First Name:</label>
                            <input type="text" id="first_name" name="first_name" placeholder="First name" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="last_name">Last Name:</label>
                            <input type="text" id="last_name" name="last_name" placeholder="Last name" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="dob">Date of Birth:</label>
                            <input type="date" id="dob" name="dob" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="airline_name">Airline Name:</label>
                            <select id="airline_name" name="airline_name" required>
                                <option value="">Select an airline</option>
                                {% for airline in airlines %}
                                    <option value="{{ airline.airline_name }}">{{ airline.airline_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" class="login-btn">Register</button>
                </form>
                
                <div class="register-link">
                    <p>Already have an account? <a href="/staff/login">Login here</a></p>
                    <p><a href="/">Go back to home</a></p>
                </div>
            </div>
        </div>
    </div>

<script>
function validatePassword() {
  const password = document.getElementById("password").value;
  const strength = document.getElementById("password-strength");
  
  // Check password length
  if (password.length < 8) {
    strength.innerHTML = "Password is too short (min 8 characters)";
    strength.style.color = "red";
    return false;
  }
  
  // Check for numbers and letters
  if (!/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/[0-9]/.test(password)) {
    strength.innerHTML = "Password should contain uppercase, lowercase, and numbers";
    strength.style.color = "orange";
    return false;
  }
  
  strength.innerHTML = "Password strength: Strong";
  strength.style.color = "green";
  return true;
}

// Add an onSubmit handler to the form
document.querySelector("form").onsubmit = function(e) {
  if (!validatePassword()) {
    e.preventDefault();
  }
};

// Add real-time validation as user types
document.getElementById("password").addEventListener("input", validatePassword);
</script>
</body>
</html>
